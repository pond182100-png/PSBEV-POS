<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smoothie POS</title>
  <style>
    :root {
      --primary: #FF6B6B;
      --bg: #f4f7f6;
      --card: #ffffff;
      --text: #2d3436;
      --border: #dfe6e9;
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }
    
    /* Layout */
    .app-container { display: flex; flex-direction: column; height: 100vh; }
    header { background: var(--card); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); }
    .nav-btn { padding: 10px 20px; font-size: 1.2rem; border: none; background: var(--border); border-radius: 8px; cursor: pointer; }
    .nav-btn.active { background: var(--primary); color: white; }
    
    .view { display: none; height: 100%; overflow: hidden; }
    .view.active { display: flex; flex: 1; }

    /* POS View */
    .menu-section { flex: 2; padding: 20px; overflow-y: auto; }
    .cart-section { flex: 1; background: var(--card); border-left: 2px solid var(--border); display: flex; flex-direction: column; }
    
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .menu-item { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.1s; }
    .menu-item:active { transform: scale(0.98); border-color: var(--primary); }
    .menu-item h3 { margin: 0 0 10px 0; font-size: 1.3rem; }
    .menu-item p { margin: 0; font-size: 1.1rem; color: #636e72; }

    /* Cart */
    .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
    .cart-item { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }
    .cart-item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; }
    .cart-item-details { font-size: 0.9rem; color: #636e72; margin: 5px 0; }
    .cart-controls { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
    .btn-qty { width: 40px; height: 40px; font-size: 1.5rem; border: none; border-radius: 50%; background: var(--border); cursor: pointer; }
    
    .cart-footer { padding: 20px; border-top: 2px solid var(--border); background: #fafafa; }
    .total-row { display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; }
    .action-btn { width: 100%; padding: 15px; font-size: 1.3rem; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    .btn-pay { background: var(--primary); color: white; }
    .btn-clear { background: var(--border); color: var(--text); }

    /* Queue View */
    .queue-section { width: 100%; padding: 30px; overflow-y: auto; }
    .queue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .order-card { background: var(--card); padding: 20px; border-radius: 12px; border: 2px solid var(--border); }
    .order-card h2 { margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
    .btn-complete { width: 100%; padding: 15px; background: #00b894; color: white; border: none; border-radius: 8px; font-size: 1.2rem; margin-top: 15px; cursor: pointer; }

    /* Modals */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; }
    .modal h2 { margin-top: 0; }
    .options-group { margin-bottom: 20px; }
    .options-group h4 { margin-bottom: 10px; }
    .chip-container { display: flex; gap: 10px; }
    .chip { padding: 12px 20px; border: 2px solid var(--border); border-radius: 30px; cursor: pointer; font-size: 1.1rem; }
    .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }
    input[type="text"], input[type="number"] { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid var(--border); border-radius: 8px; }
    .modal-actions { display: flex; gap: 15px; margin-top: 30px; }
    
    /* Loader */
    .loader { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000;}
  </style>
</head>
<body>

  <div class="loader" id="loader">Syncing...</div>

  <div class="app-container">
    <header>
      <h1>🥤 Smoothie POS</h1>
      <div>
        <button class="nav-btn active" onclick="switchTab('pos')">Register</button>
        <button class="nav-btn" onclick="switchTab('queue')">Kitchen Queue</button>
      </div>
    </header>

    <div id="pos-view" class="view active">
      <div class="menu-section">
        <div class="menu-grid" id="menu-container">
          </div>
      </div>
      
      <div class="cart-section">
        <div class="cart-items" id="cart-container">
          </div>
        <div class="cart-footer">
          <div class="total-row">
            <span>Total:</span>
            <span id="cart-total">$0.00</span>
          </div>
          <button class="action-btn btn-pay" onclick="openCheckoutModal()">Checkout</button>
          <button class="action-btn btn-clear" onclick="clearCart()">Clear Cart</button>
        </div>
      </div>
    </div>

    <div id="queue-view" class="view">
      <div class="queue-section">
        <div class="queue-grid" id="queue-container">
          </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="custom-modal">
    <div class="modal">
      <h2 id="modal-item-name">Item Name</h2>
      
      <div class="options-group">
        <h4>Sugar Level</h4>
        <div class="chip-container" id="sugar-options">
          <div class="chip" onclick="selectChip('sugar', '0%')">0%</div>
          <div class="chip" onclick="selectChip('sugar', '50%')">50%</div>
          <div class="chip selected" onclick="selectChip('sugar', '100%')">100%</div>
        </div>
      </div>

      <div class="options-group">
        <h4>Ice Level</h4>
        <div class="chip-container" id="ice-options">
          <div class="chip" onclick="selectChip('ice', 'No Ice')">No Ice</div>
          <div class="chip" onclick="selectChip('ice', 'Less Ice')">Less Ice</div>
          <div class="chip selected" onclick="selectChip('ice', 'Normal')">Normal</div>
        </div>
      </div>

      <div class="options-group">
        <h4>Note</h4>
        <input type="text" id="item-note" placeholder="E.g. extra lime">
      </div>

      <div class="modal-actions">
        <button class="action-btn btn-clear" onclick="closeModal('custom-modal')">Cancel</button>
        <button class="action-btn btn-pay" onclick="confirmAddToCart()">Add to Cart</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="checkout-modal">
    <div class="modal">
      <h2>Checkout - <span id="checkout-total">$0.00</span></h2>
      
      <div class="options-group">
        <h4>Payment Method</h4>
        <div class="chip-container" id="payment-options">
          <div class="chip selected" onclick="selectPayment('Cash')">Cash</div>
          <div class="chip" onclick="selectPayment('PromptPay')">PromptPay</div>
        </div>
      </div>

      <div class="options-group" id="cash-input-group">
        <h4>Amount Received</h4>
        <input type="number" id="cash-received" oninput="calculateChange()" placeholder="Enter amount">
        <h3 id="change-display" style="color: var(--primary); margin-top: 10px;">Change: $0.00</h3>
      </div>

      <div class="modal-actions">
        <button class="action-btn btn-clear" onclick="closeModal('checkout-modal')">Cancel</button>
        <button class="action-btn btn-pay" onclick="confirmOrder()">Confirm Paid</button>
      </div>
    </div>
  </div>

  <script>
    // --- CONFIGURATION ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbxM_kWnN0_oVEIyQ1TjpCOP3X9nUaa3akwRHbNZnDWPBaNau6MsUUYWklejVJEKkgbd/exec';
    
    // --- STATE ---
    let menuData = [];
    let cart = [];
    let currentSelectedItem = null;
    let selectedPayment = 'Cash';

    // --- INITIALIZATION ---
    window.onload = () => {
      fetchMenu();
    };

    function showLoader(show) {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
    }

    function switchTab(tab) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(`${tab}-view`).classList.add('active');
      event.target.classList.add('active');
      if (tab === 'queue') fetchQueue();
    }

    // --- API CALLS ---
    async function fetchMenu() {
      showLoader(true);
      try {
        const res = await fetch(`${API_URL}?action=getMenu`);
        const data = await res.json();
        if (data.success) {
          menuData = data.data;
          renderMenu();
        }
      } catch (err) { alert('Error loading menu.'); }
      showLoader(false);
    }

    async function fetchQueue() {
      showLoader(true);
      try {
        const res = await fetch(`${API_URL}?action=getPendingOrders`);
        const data = await res.json();
        if (data.success) renderQueue(data.data);
      } catch (err) { alert('Error loading queue.'); }
      showLoader(false);
    }

    async function submitOrderToBackend(orderPayload) {
  showLoader(true);
  try {
    const requestData = { action: 'createOrder', payload: orderPayload };
    
    console.log("Sending order to:", API_URL);

    const res = await fetch(API_URL, {
      method: 'POST',
      // CRITICAL: This exact header tricks the browser into skipping the security block
      headers: {
        'Content-Type': 'text/plain;charset=utf-8', 
      },
      body: JSON.stringify(requestData)
    });
    
    const data = await res.json();
    
    if (data.success) {
      alert('Order Confirmed!');
    } else {
      alert('Backend Error: ' + data.error);
    }
  } catch (err) { 
    console.error("The exact error is:", err);
    alert('Checkout Failed! Open browser console for details.'); 
  }
  showLoader(false);
}

    async function markOrderComplete(orderId) {
      showLoader(true);
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateOrderStatus', payload: { order_id: orderId, status: 'Completed' } })
        });
        fetchQueue();
      } catch (err) { alert('Network error updating order.'); }
      showLoader(false);
    }

    // --- RENDERERS ---
    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = menuData.map(item => `
        <div class="menu-item" onclick="openCustomModal('${item.id}')">
          <h3>${item.name}</h3>
          <p>$${item.price.toFixed(2)}</p>
        </div>
      `).join('');
    }

    function renderCart() {
      const container = document.getElementById('cart-container');
      container.innerHTML = '';
      let total = 0;

      cart.forEach((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        container.innerHTML += `
          <div class="cart-item">
            <div class="cart-item-header">
              <span>${item.name}</span>
              <span>$${subtotal.toFixed(2)}</span>
            </div>
            <div class="cart-item-details">
              Sugar: ${item.sugar} | Ice: ${item.ice} <br>
              ${item.note ? `Note: ${item.note}` : ''}
            </div>
            <div class="cart-controls">
              <button class="btn-qty" onclick="updateQty(${index}, -1)">-</button>
              <span style="font-size: 1.2rem; width: 20px; text-align:center;">${item.qty}</span>
              <button class="btn-qty" onclick="updateQty(${index}, 1)">+</button>
            </div>
          </div>
        `;
      });
      document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
    }

    function renderQueue(orders) {
      const container = document.getElementById('queue-container');
      if(orders.length === 0) { container.innerHTML = '<h3>No pending orders.</h3>'; return; }

      container.innerHTML = orders.map(order => `
        <div class="order-card">
          <h2>Order: ${order.order_id.split('-')[1].slice(-4)}</h2>
          <p style="color: gray;">Time: ${new Date(order.datetime).toLocaleTimeString()}</p>
          <ul style="padding-left: 20px; font-size: 1.1rem;">
            ${order.items.map(i => `
              <li><b>${i.qty}x ${i.name}</b><br>
              <span style="font-size:0.9rem; color:#636e72;">${i.sugar}, ${i.ice} ${i.note ? `| ${i.note}` : ''}</span></li>
            `).join('')}
          </ul>
          <button class="btn-complete" onclick="markOrderComplete('${order.order_id}')">Mark as Completed</button>
        </div>
      `).join('');
    }

    // --- LOGIC ---
    function openCustomModal(id) {
      currentSelectedItem = menuData.find(m => m.id === id);
      document.getElementById('modal-item-name').innerText = currentSelectedItem.name;
      document.getElementById('item-note').value = '';
      document.getElementById('custom-modal').classList.add('active');
    }

    function selectChip(type, value) {
      const container = document.getElementById(`${type}-options`);
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      event.target.classList.add('selected');
    }

    function getSelectedChip(type) {
      return document.querySelector(`#${type}-options .chip.selected`).innerText;
    }

    function confirmAddToCart() {
      const sugar = getSelectedChip('sugar');
      const ice = getSelectedChip('ice');
      const note = document.getElementById('item-note').value;

      // Check if exact customization exists to group
      const existing = cart.find(i => i.id === currentSelectedItem.id && i.sugar === sugar && i.ice === ice && i.note === note);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ ...currentSelectedItem, qty: 1, sugar, ice, note });
      }
      
      closeModal('custom-modal');
      renderCart();
    }

    function updateQty(index, change) {
      cart[index].qty += change;
      if (cart[index].qty <= 0) cart.splice(index, 1);
      renderCart();
    }

    function clearCart() { cart = []; renderCart(); }

    function openCheckoutModal() {
      if (cart.length === 0) return alert('Cart is empty!');
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      document.getElementById('checkout-total').innerText = `$${total.toFixed(2)}`;
      document.getElementById('cash-received').value = '';
      document.getElementById('change-display').innerText = 'Change: $0.00';
      selectPayment('Cash'); // Default
      document.getElementById('checkout-modal').classList.add('active');
    }

    function selectPayment(method) {
  selectedPayment = method;
  
  // Get all the payment chips
  const chips = document.querySelectorAll('#payment-options .chip');
  
  // Loop through them and add 'selected' only to the matching one
  chips.forEach(chip => {
    if (chip.innerText.trim() === method) {
      chip.classList.add('selected');
    } else {
      chip.classList.remove('selected');
    }
  });
  
  // Show or hide the cash input
  document.getElementById('cash-input-group').style.display = method === 'Cash' ? 'block' : 'none';
}

    function calculateChange() {
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const received = parseFloat(document.getElementById('cash-received').value) || 0;
      const change = received - total;
      document.getElementById('change-display').innerText = `Change: $${Math.max(0, change).toFixed(2)}`;
    }

    async function confirmOrder() {
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const payload = { items: cart, total: total, payment_method: selectedPayment, paid: true };
      
      closeModal('checkout-modal');
      clearCart();
      await submitOrderToBackend(payload);
      alert('Order Confirmed!');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  </script>
</body>
</html>
